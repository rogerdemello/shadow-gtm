name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow one concurrent run per ref; cancel stale ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `next build` runs the TypeScript compiler, so a green build is also a
      # green type-check. No API keys are needed: all AI/Bright Data calls happen
      # at request time, never during the build.
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
